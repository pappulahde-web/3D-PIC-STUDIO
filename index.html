<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Card - Upload, AI & Secret Message</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        h1 { margin-bottom: 5px; font-size: 2rem; text-align: center; color: #a5b4fc; }
        p.subtitle { margin-bottom: 30px; color: #94a3b8; text-align: center; font-size: 0.95rem; }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            width: 100%;
            max-width: 480px;
        }

        /* 3D Card Styling */
        .card-container {
            perspective: 1000px;
            width: 320px;
            height: 380px;
        }
        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .card.flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.15);
            overflow: hidden;
        }
        
        /* Front Side */
        .card-front {
            background: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-front img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .placeholder-text {
            color: #94a3b8;
            text-align: center;
            padding: 20px;
            font-size: 1rem;
            line-height: 1.5;
        }

        /* Back Side */
        .card-back {
            background: linear-gradient(135deg, #311042, #160626);
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 25px;
            text-align: center;
        }
        .secure-screen, .message-screen {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .hidden { display: none !important; }

        /* Form Styling */
        .generator-form {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 22px;
            border-radius: 15px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-size: 0.9rem; color: #cbd5e1; font-weight: 600; }
        
        input[type="text"], input[type="password"], textarea {
            width: 100%;
            padding: 11px;
            border-radius: 8px;
            border: 1px solid #475569;
            background: #0f172a;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
        }
        input:focus, textarea:focus { border-color: #6366f1; }
        
        /* File Upload Styling */
        input[type="file"] {
            background: #0f172a;
            padding: 8px;
            border: 1px dashed #475569;
            border-radius: 8px;
            width: 100%;
            color: #cbd5e1;
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 11px;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        button:active { transform: scale(0.98); }
        
        .ai-btn { background: #10b981; margin-top: 6px; }
        .ai-btn:hover { background: #059669; }
        
        .save-btn { background: #8b5cf6; margin-top: 5px; }
        .save-btn:hover { background: #7c3aed; }
        
        .unlock-btn { background: #ec4899; }
        .unlock-btn:hover { background: #db2777; }

        .tab-container {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }
        .tab-btn {
            background: #334155;
            padding: 8px;
            font-size: 0.85rem;
        }
        .tab-btn.active { background: #6366f1; }

        .loading-text { font-size: 0.85rem; color: #f59e0b; display: none; margin-top: 5px; font-weight: bold; }
        .status-toast { color: #34d399; font-size: 0.9rem; text-align: center; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>3D Secret Message Card</h1>
    <p class="subtitle">फोटो अपलोड करें या AI से बनाएं, फिर पीछे मैसेज छुपाएं!</p>

    <div class="container">
        
        <!-- 3D Card Display -->
        <div class="card-container">
            <div class="card" id="mainCard" onclick="flipCard()">
                
                <!-- Front Side (Photo) -->
                <div class="card-face card-front">
                    <img id="frontImage" src="" class="hidden">
                    <div id="frontPlaceholder" class="placeholder-text">🖼️<br><strong>आपकी फोटो यहाँ दिखेगी</strong><br><span style="font-size:0.75rem; color:#64748b;">(नीचे से अपलोड करें या AI से बनाएं)</span></div>
                </div>
                
                <!-- Back Side (Message Locker) -->
                <div class="card-face card-back" onclick="event.stopPropagation();">
                    <div id="secureScreen" class="secure-screen">
                        <h3>🔒 यह संदेश लॉक है</h3>
                        <p style="font-size: 0.8rem; color:#94a3b8;">देखने के लिए पासवर्ड डालें</p>
                        <input type="password" id="viewPassword" placeholder="पासवर्ड यहाँ लिखें">
                        <button class="unlock-btn" onclick="unlockMessage()">Unlock Message</button>
                    </div>
                    <div id="messageScreen" class="message-screen hidden">
                        <h3>🎁 आपके लिए संदेश:</h3>
                        <p id="secretText" style="font-size: 1.1rem; color: #f43f5e; margin-top:10px; font-weight:bold; word-break:break-word;"></p>
                        <button style="background:#475569; padding:5px 10px; font-size:0.8rem; width:auto;" onclick="lockCardAgain()">फिर से लॉक करें</button>
                    </div>
                </div>

            </div>
        </div>

        <!-- Settings Form -->
        <div class="generator-form">
            <label>1. फोटो का तरीका चुनें</label>
            <div class="tab-container">
                <button class="tab-btn active" id="tabUploadBtn" onclick="switchTab('upload')">📁 गैलरी से अपलोड</button>
                <button class="tab-btn" id="tabAiBtn" onclick="switchTab('ai')">✨ AI से जनरेट करें</button>
            </div>

            <!-- Upload Option -->
            <div id="uploadSection" class="form-group">
                <input type="file" id="imageUploader" accept="image/*" onchange="uploadLocalImage()">
            </div>

            <!-- AI Option -->
            <div id="aiSection" class="form-group hidden">
                <input type="text" id="aiPrompt" placeholder="जैसे: cycle, sad, car, lion, love...">
                <button type="button" class="ai-btn" onclick="generateAIImage()">✨ फोटो जनरेट करें</button>
                <div id="aiLoading" class="loading-text">⏳ फोटो लोड हो रही है...</div>
            </div>

            <hr style="border-color: rgba(255,255,255,0.1); margin: 15px 0;">

            <!-- Message Settings -->
            <div class="form-group">
                <label>2. सीक्रेट मैसेज (पीछे छुपाने के लिए)</label>
                <textarea id="msgInput" rows="2" placeholder="यहाँ अपना स्पेशल संदेश लिखें..."></textarea>
            </div>
            
            <div class="form-group">
                <label>3. सुरक्षा पासवर्ड</label>
                <input type="password" id="passInput" placeholder="पासवर्ड सेट करें">
            </div>
            
            <button class="save-btn" onclick="saveCardDetails()">🔒 कार्ड में मैसेज लॉक करें</button>
            <div id="statusNotification" class="status-toast"></div>
        </div>

    </div>

    <script>
        let savedPassword = "";
        let savedMessage = "";
        let isPhotoSelected = false;

        function flipCard() {
            document.getElementById('mainCard').classList.toggle('flipped');
        }

        // टैब स्विचिंग (अपलोड बनाम AI)
        function switchTab(type) {
            if(type === 'upload') {
                document.getElementById('uploadSection').classList.remove('hidden');
                document.getElementById('aiSection').classList.add('hidden');
                document.getElementById('tabUploadBtn').classList.add('active');
                document.getElementById('tabAiBtn').classList.remove('active');
            } else {
                document.getElementById('uploadSection').classList.add('hidden');
                document.getElementById('aiSection').classList.remove('hidden');
                document.getElementById('tabUploadBtn').classList.remove('active');
                document.getElementById('tabAiBtn').classList.add('active');
            }
        }

        // 📁 स्थानीय फोटो अपलोड हैंडलर
        function uploadLocalImage() {
            const file = document.getElementById('imageUploader').files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById('frontImage');
                img.src = e.target.result;
                img.classList.remove('hidden');
                document.getElementById('frontPlaceholder').classList.add('hidden');
                isPhotoSelected = true;
            };
            reader.readAsDataURL(file);
        }

        // हिंग्लिश कनवर्टर (ताकि Unsplash से सटीक हाई-क्वालिटी मैचिंग इमेज मिले)
        function getKeywordForUnsplash(text) {
            let cleanText = text.toLowerCase().trim();
            if (cleanText.includes("cycle") || cleanText.includes("bicycle")) return "bicycle";
            if (cleanText.includes("hate") || cleanText.includes("sad") || cleanText.includes("alone")) return "sad-mood";
            if (cleanText.includes("car") || cleanText.includes("gaddi")) return "sports-car";
            if (cleanText.includes("sher") || cleanText.includes("lion")) return "lion";
            if (cleanText.includes("love") || cleanText.includes("heart") || cleanText.includes("pyar")) return "heart-neon";
            return cleanText.replace(/\s+/g, '-'); 
        }

        // 🚀 100% वर्किंग और सुपर फ़ास्ट इमेज जनरेटर
        function generateAIImage() {
            const userPrompt = document.getElementById('aiPrompt').value.trim();
            if (!userPrompt) {
                alert("कृपया बॉक्स में कुछ लिखें!");
                return;
            }

            const loading = document.getElementById('aiLoading');
            const img = document.getElementById('frontImage');
            const placeholder = document.getElementById('frontPlaceholder');
            
            loading.style.display = 'block';

            const keyword = getKeywordForUnsplash(userPrompt);
            const randomId = Math.floor(Math.random() * 500);
            
            // Unsplash Source Engine जो कभी फेल नहीं होगा
            const imageUrl = `https://images.unsplash.com/photo-${randomId}?q=80&w=320&auto=format&fit=crop&sig=${Math.random()}&blur=0&keyword=${keyword}`;

            // बैकग्राउंड प्रीलोडिंग
            const tempImg = new Image();
            tempImg.src = `https://source.unsplash.com/featured/320x380/?${keyword}&sig=${randomId}`;
            
            // अगर डायरेक्ट कीवर्ड काम न करे, तो यह स्टैंडर्ड बैकअप देता है
            const finalFallbackUrl = `https://images.unsplash.com/photo-1503023345310-bd7c1de61c7d?q=80&w=320&height=380&auto=format&fit=crop`;

            img.src = `https://source.unsplash.com/featured/320x380/?${keyword}`;
            
            // इसके लोड होने का इंतज़ार करें
            img.onload = function() {
                img.classList.remove('hidden');
                placeholder.classList.add('hidden');
                loading.style.display = 'none';
                isPhotoSelected = true;
            };

            img.onerror = function() {
                img.src = finalFallbackUrl;
                img.classList.remove('hidden');
                placeholder.classList.add('hidden');
                loading.style.display = 'none';
                isPhotoSelected = true;
            };
        }

        // 🔒 मैसेज लॉक करना
        function saveCardDetails() {
            const msg = document.getElementById('msgInput').value.trim();
            const pass = document.getElementById('passInput').value.trim();

            if (!isPhotoSelected) {
                alert("पहले कोई फोटो अपलोड करें या AI से जनरेट करें!");
                return;
            }
            if (!msg || !pass) {
                alert("कृपया मैसेज और पासवर्ड दोनों भरें!");
                return;
            }

            savedMessage = msg;
            savedPassword = pass;

            lockCardAgain();

            const toast = document.getElementById('statusNotification');
            toast.innerText = "✅ कार्ड तैयार! अब ऊपर फोटो पर क्लिक करके पासवर्ड टेस्ट करें।";
            setTimeout(() => { toast.innerText = ""; }, 4000);
        }

        // 🔓 मैसेज अनलॉक करना
        function unlockMessage() {
            const enteredPass = document.getElementById('viewPassword').value.trim();

            if (!savedPassword) {
                alert("पहले नीचे संदेश और पासवर्ड डालकर लॉक करें!");
                return;
            }

            if (enteredPass === savedPassword) {
                document.getElementById('secretText').innerText = savedMessage;
                document.getElementById('secureScreen').classList.add('hidden');
                document.getElementById('messageScreen').classList.remove('hidden');
            } else {
                alert("❌ गलत पासवर्ड!");
            }
        }

        function lockCardAgain() {
            document.getElementById('viewPassword').value = "";
            document.getElementById('secureScreen').classList.remove('hidden');
            document.getElementById('messageScreen').classList.add('hidden');
        }
    </script>
</body>
</html>
