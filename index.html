<!DOCTYPE html>
<html lang="hi">
<head>
    <script>
        // ⚡ आपकी लाइव बैकएंड API का लिंक
        const API_URL = 'https://onrender.com';
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ 3D PIC STUDIO - Premium Digital Art Maker</title>
    
    <!-- Google Fonts & Tailwind CSS CDN -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://jsdelivr.net"></script>

    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at top right, #1e1b4b 0%, #0f172a 60%, #020617 100%);
            color: #f8fafc; 
            min-height: 100vh; 
        }
        .glass-panel { 
            background: rgba(15, 23, 42, 0.45); 
            backdrop-filter: blur(24px); 
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }
        .glass-input { 
            background: rgba(0, 0, 0, 0.5); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            color: white; 
            transition: all 0.3s ease;
        }
        .glass-input:focus { 
            border-color: #6366f1; 
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.25);
            outline: none; 
        }
        .card-3d-wrap { perspective: 1500px; width: 320px; height: 460px; }
        .card-3d-inner { 
            width: 100%; 
            height: 100%; 
            position: relative; 
            transform-style: preserve-3d; 
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); 
            cursor: pointer; 
        }
        .card-3d-inner.flipped { transform: rotateY(180deg); }
        .card-front, .card-back { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            backface-visibility: hidden; 
            border-radius: 28px; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.6); 
            border: 1px solid rgba(255, 255, 255, 0.15); 
        }
        .card-back { transform: rotateY(180deg); padding: 28px; justify-content: space-between; background: #0f172a; }
        
        /* Art Themes & Gradients */
        .art-bg-default { background: linear-gradient(135deg, #4f46e5, #06b6d4); }
        .theme-lemon { background: linear-gradient(135deg, #fef08a, #eab308); color: #0f172a; }
        .theme-peri { background: linear-gradient(135deg, #c7d2fe, #6366f1); color: white; }
        .theme-rose { background: linear-gradient(135deg, #fbcfe8, #db2777); color: white; }
        .theme-birthday { background: linear-gradient(135deg, #ffedd5, #f97316); color: white; }
        .theme-love { background: linear-gradient(135deg, #ffe4e6, #e11d48); color: white; }
        .theme-festival { background: linear-gradient(135deg, #fae8ff, #a855f7); color: white; }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col justify-between items-center min-h-screen">

    <!-- Header Navigation -->
    <header class="max-w-6xl w-full mx-auto mb-8 glass-panel p-4 rounded-2xl flex justify-between items-center px-6">
        <div class="flex items-center gap-2">
            <span class="text-2xl">✨</span>
            <h1 class="text-xl md:text-2xl font-black tracking-wider bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 bg-clip-text text-transparent">
                3D PIC STUDIO
            </h1>
        </div>
    </header>

    <!-- Main Studio Dashboard -->
    <main class="max-w-6xl w-full mx-auto flex-1 grid grid-cols-1 lg:grid-cols-12 gap-8 items-center w-full">
        
        <!-- Left Side: Creator Tools -->
        <div id="creator-view" class="lg:col-span-7 glass-panel p-6 md:p-8 rounded-3xl space-y-6">
            <div>
                <span class="bg-indigo-500/10 text-indigo-400 text-[10px] font-bold tracking-widest uppercase px-3 py-1 rounded-full border border-indigo-500/20">AI Engine Active</span>
                <h2 class="text-2xl font-extrabold text-white mt-2 mb-1">आर्ट स्टूडियो मेकर</h2>
                <p class="text-sm text-slate-400">विवरण भरें और लाइव 3D कार्ड जेनरेट करें।</p>
            </div>
            
            <!-- Step 1 -->
            <div class="space-y-3">
                <label class="block font-bold text-xs text-indigo-300 uppercase tracking-wider">कदम 1: नाम और भावना सेट करें</label>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <input type="text" id="ai-prompt" oninput="updatePreviewFront()" placeholder="उदा: HAPPY BIRTHDAY, I LOVE YOU..." class="p-3.5 glass-input text-sm rounded-xl">
                    <select id="emoji-select" onchange="updatePreviewFront()" class="p-3.5 glass-input text-sm rounded-xl bg-slate-900 text-white cursor-pointer">
                        <option value="❤️">❤️ प्यार (Love)</option>
                        <option value="😇">😇 कार्टून स्माइल (Cute)</option>
                        <option value="🧸">🧸 टेडी बियर (Teddy)</option>
                        <option value="🎂">🎂 जन्मदिन (Birthday)</option>
                        <option value="😡">😡 गुस्सा (Angry)</option>
                        <option value="🐱">🐱 बिल्ली कार्टून (Cat)</option>
                    </select>
                </div>
            </div>

            <!-- Step 2 & 3 -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div class="space-y-2">
                    <label class="block font-bold text-xs text-indigo-300 uppercase tracking-wider">कदम 2: पीछे का सीक्रेट मैसेज</label>
                    <input type="text" id="card-message" oninput="updatePreviewBack()" placeholder="यहाँ अपना गुप्त संदेश लिखें..." class="w-full p-3.5 glass-input text-sm rounded-xl">
                </div>
                <div class="space-y-2">
                    <label class="block font-bold text-xs text-indigo-300 uppercase tracking-wider">कदम 3: सुरक्षा लॉक पासवर्ड</label>
                    <input type="password" id="card-password" placeholder="सिक्योरिटी पिन बनाएं..." class="w-full p-3.5 glass-input text-sm rounded-xl">
                </div>
            </div>

            <!-- Step 4 -->
            <div class="space-y-2">
                <label class="block font-bold text-xs text-indigo-300 uppercase tracking-wider">कदम 4: प्रीमियम थीम चुनें</label>
                <div class="grid grid-cols-3 sm:grid-cols-6 gap-2">
                    <button onclick="setTheme('lemon')" class="p-2.5 rounded-xl font-bold text-xs bg-gradient-to-br from-yellow-300 to-yellow-500 text-slate-900 shadow transform hover:scale-105 transition">Gold</button>
                    <button onclick="setTheme('peri')" class="p-2.5 rounded-xl font-bold text-xs bg-gradient-to-br from-indigo-400 to-indigo-600 text-white shadow transform hover:scale-105 transition">Indigo</button>
                    <button onclick="setTheme('rose')" class="p-2.5 rounded-xl font-bold text-xs bg-gradient-to-br from-pink-400 to-pink-600 text-white shadow transform hover:scale-105 transition">Rose</button>
                    <button onclick="setTheme('birthday')" class="p-2.5 rounded-xl font-bold text-xs bg-gradient-to-br from-orange-400 to-orange-600 text-white shadow transform hover:scale-105 transition">Orange</button>
                    <button onclick="setTheme('love')" class="p-2.5 rounded-xl font-bold text-xs bg-gradient-to-br from-rose-400 to-red-600 text-white shadow transform hover:scale-105 transition">❤ Love</button>
                    <button onclick="setTheme('festival')" class="p-2.5 rounded-xl font-bold text-xs bg-gradient-to-br from-purple-500 to-purple-700 text-white shadow transform hover:scale-105 transition">Festival</button>
                </div>
            </div>

            <!-- Publish Button -->
            <button id="publish-btn" onclick="publishCardToServer()" class="w-full bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 hover:brightness-110 text-white text-base font-bold p-4 rounded-xl shadow-lg shadow-indigo-500/20 transition-all cursor-pointer">
                🚀 लाइव लिंक जेनरेट करें
            </button>
            
            <!-- Dynamic Success Link Box -->
            <div id="link-box" class="hidden bg-emerald-500/10 border border-emerald-500/30 p-4 rounded-xl space-y-2">
                <p class="font-bold text-xs text-emerald-400 flex items-center gap-1">✨ कार्ड लाइव हो गया है! लिंक कॉपी करें:</p>
                <div class="flex gap-2">
                    <input type="text" id="share-url-output" readonly class="flex-1 bg-black/30 p-2.5 rounded-lg text-xs font-semibold text-slate-300 border border-slate-700">
                    <button onclick="copyLink()" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold px-4 rounded-lg text-xs transition cursor-pointer">Copy</button>
                </div>
            </div>
        </div>

        <!-- Right Side: Interactive 3D Preview -->
        <div class="lg:col-span-5 flex flex-col items-center justify-center py-6">
            <span class="text-[11px] font-bold tracking-widest text-indigo-400 uppercase mb-4 bg-indigo-500/10 px-4 py-1.5 rounded-full border border-indigo-500/20">
                3D लाइव प्रीव्यू (टैप करें)
            </span>
            
            <div class="card-3d-wrap" onclick="document.getElementById('preview-inner').classList.toggle('flipped')">
                <div class="card-3d-inner" id="preview-inner">
                    
                    <!-- Front Design -->
