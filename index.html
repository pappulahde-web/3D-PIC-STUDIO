<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Secret Surprise Card</title>
    
    <!-- 🌐 OPEN GRAPH TAGS: जब आप इस साइट को Vercel पर डालेंगे, तो यह फोटो WhatsApp पर दिखेगी -->
    <meta property="og:title" content="🎁 आपके लिए एक सीक्रेट 3D कार्ड आया है!">
    <meta property="og:description" content="अंदर एक जादुई फोटो और गुप्त संदेश छुपा है। पासवर्ड डालकर अभी खोलें!">
    <meta property="og:image" content="https://images.unsplash.com/photo-1513151233558-d860c5398176?w=500"> <!-- आप यहाँ कोई भी गिफ्ट की फोटो बदल सकते हैं -->
    <meta property="og:type" content="website">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        h1 { margin-bottom: 5px; font-size: 2rem; text-align: center; color: #a5b4fc; }
        p.subtitle { margin-bottom: 30px; color: #94a3b8; text-align: center; font-size: 0.95rem; }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            width: 100%;
            max-width: 480px;
        }

        /* 3D Card */
        .card-container { perspective: 1000px; width: 320px; height: 380px; }
        .card {
            width: 100%; height: 100%; position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .card.flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.15); overflow: hidden;
        }
        .card-front { background: #1e293b; display: flex; align-items: center; justify-content: center; }
        .card-front img { width: 100%; height: 100%; object-fit: cover; }
        .placeholder-text { color: #94a3b8; text-align: center; padding: 20px; }

        .card-back {
            background: linear-gradient(135deg, #311042, #160626);
            transform: rotateY(180deg); display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 25px;
        }
        .secure-screen, .message-screen {
            width: 100%; display: flex; flex-direction: column; align-items: center; gap: 12px;
        }
        .hidden { display: none !important; }

        /* Form */
        .generator-form {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
            padding: 22px; border-radius: 15px; width: 100%; border: 1px solid rgba(255,255,255,0.1);
        }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-size: 0.9rem; color: #cbd5e1; font-weight: 600; }
        
        input[type="text"], input[type="password"], textarea {
            width: 100%; padding: 11px; border-radius: 8px; border: 1px solid #475569;
            background: #0f172a; color: #fff; font-size: 0.95rem; outline: none;
        }
        input:focus, textarea:focus { border-color: #6366f1; }
        
        input[type="file"] {
            background: #0f172a; padding: 8px; border: 1px dashed #475569;
            border-radius: 8px; width: 100%; color: #cbd5e1; cursor: pointer;
        }

        button {
            width: 100%; padding: 11px; color: white; border: none; border-radius: 8px;
            font-size: 0.95rem; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: background 0.2s, transform 0.1s;
        }
        button:active { transform: scale(0.98); }
        .ai-btn { background: #10b981; margin-top: 6px; }
        .share-btn { background: #8b5cf6; margin-top: 10px; font-size: 1.05rem; }

        .tab-container { display: flex; gap: 10px; margin-bottom: 12px; }
        .tab-btn { background: #334155; padding: 8px; font-size: 0.85rem; }
        .tab-btn.active { background: #6366f1; }
        .loading-text { font-size: 0.85rem; color: #f59e0b; display: none; margin-top: 5px; font-weight: bold; }
        
        /* Share Result Box */
        .share-section {
            background: #065f46; padding: 15px; border-radius: 8px; margin-top: 15px;
            text-align: center; border: 1px solid #10b981;
        }
        .share-link {
            background: #022c22; padding: 10px; border-radius: 5px; word-break: break-all;
            margin-top: 8px; font-size: 0.85rem; border: 1px dashed #34d399; color: #34d399;
            margin-bottom: 12px; max-height: 60px; overflow-y: auto;
        }

        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .copy-action-btn { background: #2563eb; grid-column: span 2; }
        .whatsapp-btn { background: #22c55e; }
        .insta-btn { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        .fb-btn { background: #1877f2; }
        .twitter-btn { background: #000000; border: 1px solid #334155; }
    </style>
</head>
<body>

    <h1>3D Secret Message Card</h1>
    <p class="subtitle">आकर्षक टेक्स्ट और सोशल शेयरिंग फीचर्स के साथ!</p>

    <div class="container">
        <div class="card-container">
            <div class="card" id="mainCard" onclick="flipCard()">
                <div class="card-face card-front">
                    <img id="frontImage" src="" class="hidden">
                    <div id="frontPlaceholder" class="placeholder-text"><i class="fa-regular fa-image" style="font-size: 2rem; margin-bottom: 10px;"></i><br><strong>फोटो यहाँ दिखेगी</strong></div>
                </div>
                <div class="card-face card-back" onclick="event.stopPropagation();">
                    <div id="secureScreen" class="secure-screen">
                        <h3><i class="fa-solid fa-lock"></i> यह संदेश लॉक है</h3>
                        <input type="password" id="viewPassword" placeholder="पासवर्ड डालें">
                        <button style="background:#ec4899;" onclick="unlockMessage()"><i class="fa-solid fa-unlock"></i> Unlock</button>
                    </div>
                    <div id="messageScreen" class="message-screen hidden">
                        <h3><i class="fa-solid fa-gift"></i> संदेश:</h3>
                        <p id="secretText" style="font-size: 1.1rem; color: #f43f5e; font-weight:bold;"></p>
                    </div>
                </div>
            </div>
        </div>

        <div class="generator-form" id="editorForm">
            <label>1. फोटो का तरीका</label>
            <div class="tab-container">
                <button class="tab-btn active" id="tabUploadBtn" onclick="switchTab('upload')"><i class="fa-solid fa-folder-open"></i> गैलरी अपलोड</button>
                <button class="tab-btn" id="tabAiBtn" onclick="switchTab('ai')"><i class="fa-solid fa-wand-magic-sparkles"></i> AI जनरेशन</button>
            </div>

            <div id="uploadSection" class="form-group">
                <input type="file" id="imageUploader" accept="image/*" onchange="uploadToCloud()">
                <div id="uploadLoading" class="loading-text"><i class="fa-solid fa-spinner fa-spin"></i> फोटो अपलोड हो रही है...</div>
            </div>

            <div id="aiSection" class="form-group hidden">
                <input type="text" id="aiPrompt" placeholder="जैसे: red car on mountain...">
                <button type="button" class="ai-btn" onclick="generateAIImage()"><i class="fa-solid fa-bolt"></i> फोटो बनाएं</button>
                <div id="aiLoading" class="loading-text"><i class="fa-solid fa-circle-notch fa-spin"></i> AI काम कर रहा है...</div>
            </div>

            <hr style="border-color: rgba(255,255,255,0.1); margin: 15px 0;">
            <div class="form-group"><label>2. सीक्रेट संदेश</label><textarea id="msgInput" rows="2" placeholder="चिट्ठी यहाँ लिखें..."></textarea></div>
            <div class="form-group"><label>3. पासवर्ड</label><input type="password" id="passInput" placeholder="पासवर्ड चुनें"></div>
            
            <button class="share-btn" onclick="generateShareableLink()"><i class="fa-solid fa-link"></i> छोटा शेयर लिंक बनाएं</button>

            <div id="shareResult" class="share-section hidden">
                <strong>🎉 कार्ड तैयार है! शेयर करें:</strong>
                <div class="share-link" id="finalLink"></div>
                
                <div class="action-btns">
                    <button class="copy-action-btn" id="copyBtn" onclick="copyToClipboard()"><i class="fa-regular fa-copy"></i> Copy Link</button>
                    <button class="whatsapp-btn" onclick="shareSocial('wa')"><i class="fa-brands fa-whatsapp"></i> WhatsApp</button>
                    <button class="insta-btn" onclick="shareSocial('ig')"><i class="fa-brands fa-instagram"></i> Instagram</button>
                    <button class="fb-btn" onclick="shareSocial('fb')"><i class="fa-brands fa-facebook"></i> Facebook</button>
                    <button class="twitter-btn" onclick="shareSocial('tw')"><i class="fa-brands fa-x-twitter"></i> X / Twitter</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let globalPassword = "";
        let finalImageSource = ""; 
        let imageMode = "upload";
        let generatedLinkUrl = "";

        function flipCard() { document.getElementById('mainCard').classList.toggle('flipped'); }
        function switchTab(type) {
            imageMode = type;
            document.getElementById('uploadSection').classList.toggle('hidden', type !== 'upload');
            document.getElementById('aiSection').classList.toggle('hidden', type !== 'ai');
            document.getElementById('tabUploadBtn').classList.toggle('active', type === 'upload');
            document.getElementById('tabAiBtn').classList.toggle('active', type === 'ai');
        }

        // 📁 क्लाउड अपलोड
        function uploadToCloud() {
            const file = document.getElementById('imageUploader').files[0];
            if (!file) return;
            const loading = document.getElementById('uploadLoading');
            loading.style.display = 'block';

            const formData = new FormData();
            formData.append("file", file);

            fetch("https://tmpfiles.org/api/v1/upload", { method: "POST", body: formData })
            .then(res => res.json())
            .then(data => {
                let rawUrl = data.data.url; 
                finalImageSource = rawUrl.replace("tmpfiles.org/", "tmpfiles.org/dl/");
                displayImage(finalImageSource);
                loading.style.display = 'none';
            })
            .catch(() => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    finalImageSource = e.target.result;
                    displayImage(finalImageSource);
                    loading.style.display = 'none';
                };
                reader.readAsDataURL(file);
            });
        }

        function displayImage(src) {
            const img = document.getElementById('frontImage');
            img.src = src;
            img.classList.remove('hidden');
            document.getElementById('frontPlaceholder').classList.add('hidden');
        }

        // ✨ AI जनरेशन
        function generateAIImage() {
            let text = document.getElementById('aiPrompt').value.trim();
            if (!text) { alert("कुछ लिखिए!"); return; }
            const loading = document.getElementById('aiLoading');
            loading.style.display = 'block';

            let englishPrompt = text;
            const dictionary = {
                "ladka": "boy", "ladki": "girl", "sher": "lion", "gadi": "car", "gaddi": "car",
                "rota": "crying", "sad": "sad mood", "khush": "happy", "pahar": "mountain", 
                "barish": "rain", "dil": "heart shape", "cycle": "bicycle"
            };

            Object.keys(dictionary).forEach(key => {
                let reg = new RegExp(key, "g");
                englishPrompt = englishPrompt.toLowerCase().replace(reg, dictionary[key]);
            });

            const randomSeed = Math.floor(Math.random() * 99999);
            finalImageSource = `https://image.pollinations.ai/p/${encodeURIComponent(englishPrompt)}?width=320&height=380&seed=${randomSeed}&model=flux&nologo=true`;

            const temp = new Image();
            temp.src = finalImageSource;
            temp.onload = function() {
                displayImage(finalImageSource);
                loading.style.display = 'none';
            };
        }

        // 🔗 लिंक जनरेटर
        function generateShareableLink() {
            const msg = document.getElementById('msgInput').value.trim();
            const pass = document.getElementById('passInput').value.trim();

            if (!finalImageSource) { alert("पहले फोटो सेट करें!"); return; }
            if (!msg || !pass) { alert("संदेश और पासवर्ड भरें!"); return; }

            const pack = {
                img: btoa(encodeURIComponent(finalImageSource)),
                msg: btoa(encodeURIComponent(msg)),
                pas: btoa(encodeURIComponent(pass))
            };

            generatedLinkUrl = `${window.location.href.split('?')[0]}?card=${btoa(encodeURIComponent(JSON.stringify(pack)))}`;
            document.getElementById('finalLink').innerText = generatedLinkUrl;
            document.getElementById('copyBtn').innerHTML = '<i class="fa-regular fa-copy"></i> Copy Link';
            document.getElementById('shareResult').classList.remove('hidden');
        }

        function copyToClipboard() {
            if (!generatedLinkUrl) return;
            navigator.clipboard.writeText(generatedLinkUrl).then(() => {
                const copyBtn = document.getElementById('copyBtn');
                copyBtn.innerHTML = '<i class="fa-solid fa-check"></i> Copied! 👍';
                setTimeout(() => { copyBtn.innerHTML = '<i class="fa-regular fa-copy"></i> Copy Link'; }, 2000);
            });
        }

        // 🌐 अट्रैक्टिव टेक्स्ट बूस्टर के साथ मास्टर सोशल शेयरिंग लॉजिक
        function shareSocial(platform) {
            if (!generatedLinkUrl) return;
            
            // 🔥 यह धमाकेदार टेक्स्ट सामने वाले को क्लिक करने पर मजबूर कर देगा!
            const messageText = `🎁 *आपके लिए एक सीक्रेट 3D सरप्राइज कार्ड आया है!* \n\n🔒 इसके अंदर एक बहुत ही सुंदर फोटो और गुप्त संदेश छुपाया गया है। \n\n👇 देखने के लिए अभी नीचे दिए गए लिंक को खोलें:\n🔗 ${generatedLinkUrl}`;
            
            if (platform === 'wa') {
                window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(messageText)}`, '_blank');
            } else if (platform === 'fb') {
                window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(generatedLinkUrl)}`, '_blank');
            } else if (platform === 'tw') {
                window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(messageText)}`, '_blank');
            } else if (platform === 'ig') {
                copyToClipboard();
                alert("🔗 धमाकेदार लिंक कॉपी कर लिया गया है! अब आप इसे सीधे अपने Instagram Story या DM में पेस्ट करके दोस्तों को चौंका सकते हैं।");
            }
        }

        function unlockMessage() {
            const entered = document.getElementById('viewPassword').value.trim();
            if (btoa(encodeURIComponent(entered)) === globalPassword) {
                document.getElementById('secureScreen').classList.add('hidden');
                document.getElementById('messageScreen').classList.remove('hidden');
            } else { alert("गलत पासवर्ड!"); }
        }

        window.onload = function() {
            const cardParam = new URLSearchParams(window.location.search).get('card');
            if (cardParam) {
                document.getElementById('editorForm').classList.add('hidden');
                try {
                    const data = JSON.parse(decodeURIComponent(atob(cardParam)));
                    displayImage(decodeURIComponent(atob(data.img)));
                    globalPassword = data.pas;
                    document.getElementById('secretText').innerText = decodeURIComponent(atob(data.msg));
                } catch (e) { alert("लिंक इनवैलिड है।"); }
            }
        }
    </script>
</body>
</html>
