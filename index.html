<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Card - Live AI & Secret Message</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        h1 { margin-bottom: 5px; font-size: 2rem; text-align: center; color: #a5b4fc; }
        p.subtitle { margin-bottom: 30px; color: #94a3b8; text-align: center; font-size: 0.95rem; }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            width: 100%;
            max-width: 480px;
        }

        /* 3D Card Styling */
        .card-container {
            perspective: 1000px;
            width: 320px;
            height: 380px;
        }
        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .card.flipped {
            transform: rotateY(180deg);
        }
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.15);
            overflow: hidden;
        }
        
        /* Front Face (AI Photo) */
        .card-front {
            background: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-front img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .placeholder-text {
            color: #94a3b8;
            text-align: center;
            padding: 20px;
            font-size: 1rem;
            line-height: 1.5;
        }

        /* Back Face (Secret Message) */
        .card-back {
            background: linear-gradient(135deg, #311042, #160626);
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 25px;
            text-align: center;
        }

        .secure-screen, .message-screen {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .hidden { display: none !important; }

        /* Form Styling */
        .generator-form {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 22px;
            border-radius: 15px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-size: 0.9rem; color: #cbd5e1; font-weight: 600; }
        
        input[type="text"], input[type="password"], textarea {
            width: 100%;
            padding: 11px;
            border-radius: 8px;
            border: 1px solid #475569;
            background: #0f172a;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
        }
        input:focus, textarea:focus { border-color: #6366f1; }

        button {
            width: 100%;
            padding: 12px;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        button:active { transform: scale(0.98); }
        
        .ai-btn { background: #10b981; }
        .ai-btn:hover { background: #059669; }
        
        .save-btn { background: #8b5cf6; margin-top: 5px; }
        .save-btn:hover { background: #7c3aed; }
        
        .unlock-btn { background: #ec4899; }
        .unlock-btn:hover { background: #db2777; }

        .loading-text { font-size: 0.85rem; color: #f59e0b; display: none; margin-top: 5px; font-weight: bold; }
        .status-toast { color: #34d399; font-size: 0.9rem; text-align: center; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>3D Secret Message Card</h1>
    <p class="subtitle">फोटो जनरेट करें, मैसेज लॉक करें और कार्ड पर क्लिक करके पलटें!</p>

    <div class="container">
        
        <!-- 3D Card Display -->
        <div class="card-container">
            <div class="card" id="mainCard" onclick="flipCard()">
                
                <!-- Front Side (Live AI Image) -->
                <div class="card-face card-front">
                    <img id="frontImage" src="" class="hidden">
                    <div id="frontPlaceholder" class="placeholder-text">🎨<br><strong>आपकी AI फोटो यहाँ दिखेगी</strong><br><span style="font-size:0.75rem; color:#64748b;">(नीचे से जनरेट करें)</span></div>
                </div>
                
                <!-- Back Side (Password Protected Message) -->
                <div class="card-face card-back" onclick="event.stopPropagation();">
                    <!-- Lock Screen -->
                    <div id="secureScreen" class="secure-screen">
                        <h3>🔒 यह संदेश लॉक है</h3>
                        <p style="font-size: 0.8rem; color:#94a3b8;">देखने के लिए पासवर्ड डालें</p>
                        <input type="password" id="viewPassword" placeholder="पासवर्ड यहाँ लिखें">
                        <button class="unlock-btn" onclick="unlockMessage()">Unlock Message</button>
                    </div>
                    <!-- Secret Message Screen -->
                    <div id="messageScreen" class="message-screen hidden">
                        <h3>🎁 आपके लिए संदेश:</h3>
                        <p id="secretText" style="font-size: 1.1rem; color: #f43f5e; margin-top:10px; font-weight:bold; word-break:break-word;"></p>
                        <button style="background:#475569; padding:6px 12px; font-size:0.8rem; width:auto;" onclick="lockCardAgain()">फिर से लॉक करें</button>
                    </div>
                </div>

            </div>
        </div>

        <!-- Settings Form -->
        <div class="generator-form">
            <!-- 1. AI Image Prompt -->
            <div class="form-group">
                <label>1. AI फोटो (अपनी भाषा में लिखें)</label>
                <input type="text" id="aiPrompt" placeholder="जैसे: cycle ke sath pic, i hate you, ek sher...">
                <button type="button" class="ai-btn" style="margin-top: 6px;" onclick="generateAIImage()">✨ फोटो जनरेट करें</button>
                <div id="aiLoading" class="loading-text">⏳ असली AI फोटो बन रही है, 3-4 सेकंड रुकें...</div>
            </div>

            <hr style="border-color: rgba(255,255,255,0.1); margin: 15px 0;">

            <!-- 2. Secret Message & Password -->
            <div class="form-group">
                <label>2. सीक्रेट मैसेज (जो पीछे छुपेगा)</label>
                <textarea id="msgInput" rows="2" placeholder="यहाँ अपना सीक्रेट संदेश लिखें..."></textarea>
            </div>
            
            <div class="form-group">
                <label>3. सुरक्षा पासवर्ड बनाएं</label>
                <input type="password" id="passInput" placeholder="पासवर्ड सेट करें">
            </div>
            
            <button class="save-btn" onclick="saveCardDetails()">🔒 कार्ड में मैसेज लॉक करें</button>
            <div id="statusNotification" class="status-toast"></div>
        </div>

    </div>

    <script>
        let savedPassword = "";
        let savedMessage = "";

        // कार्ड पलटने का फ़ंक्शन (सिर्फ तभी काम करेगा जब फ्रंट देखना हो या बैक लॉक हो)
        function flipCard() {
            document.getElementById('mainCard').classList.toggle('flipped');
        }

        // हिंग्लिश को समझने वाला ट्रांसलेटर इंजन
        function convertHinglishToEnglish(text) {
            let cleanText = text.toLowerCase().trim();
            if (cleanText.includes("cycle ke sath") || cleanText.includes("cycle wali") || cleanText.includes("cycle ke sath pic")) {
                return "A realistic cinematic landscape of a modern sports bicycle parked on a beautiful autumn street with colorful trees, 4k photo";
            }
            if (cleanText.includes("hate you") || cleanText.includes("i hate you")) {
                return "A creative dark aesthetic neon sign on a brick wall saying 'I HATE YOU', moody atmosphere, high resolution";
            }
            if (cleanText.includes("car ke sath") || cleanText.includes("gaddi") || cleanText.includes("car wali")) {
                return "A luxury modern sports car parked under city neon lights at rainy night, reflections on wet ground, photorealistic";
            }
            if (cleanText.includes("sher") || cleanText.includes("lion")) {
                return "A majestic powerful lion sitting proudly on a rock, dramatic sunset lighting, cinematic wildlife photography";
            }
            if (cleanText.includes("love") || cleanText.includes("pyar")) {
                return "A beautiful romantic digital art of floating glowing hearts, dreamy background";
            }
            return cleanText + ", high quality, photorealistic masterpiece";
        }

        // 🚀 असली AI इमेज जनरेशन फ़ंक्शन
        function generateAIImage() {
            const userPrompt = document.getElementById('aiPrompt').value.trim();
            if (!userPrompt) {
                alert("कृपया पहले कुछ टाइप करें!");
                return;
            }

            const loading = document.getElementById('aiLoading');
            const img = document.getElementById('frontImage');
            const placeholder = document.getElementById('frontPlaceholder');
            
            loading.style.display = 'block';

            const englishPrompt = convertHinglishToEnglish(userPrompt);
            const randomSeed = Math.floor(Math.random() * 999999);
            
            // Flux AI Live URL
            const aiUrl = `https://image.pollinations.ai/p/${encodeURIComponent(englishPrompt)}?width=320&height=380&seed=${randomSeed}&model=flux&nologo=true`;

            const tempImg = new Image();
            tempImg.src = aiUrl;
            
            tempImg.onload = function() {
                img.src = aiUrl;
                img.classList.remove('hidden');
                placeholder.classList.add('hidden');
                loading.style.display = 'none';
            };

            tempImg.onerror = function() {
                loading.style.display = 'none';
                alert("सर्वर व्यस्त है, कृपया दोबारा दबाएं।");
            };
        }

        // 🔒 कार्ड में मैसेज सेव करने का फ़ंक्शन
        function saveCardDetails() {
            const msg = document.getElementById('msgInput').value.trim();
            const pass = document.getElementById('passInput').value.trim();

            if (!msg || !pass) {
                alert("कृपया मैसेज और पासवर्ड दोनों भरें ताकि उसे लॉक किया जा सके!");
                return;
            }

            savedMessage = msg;
            savedPassword = pass;

            // बैकसाइड रीसेट करें ताकि पुराना खुला मैसेज न दिखे
            lockCardAgain();

            const toast = document.getElementById('statusNotification');
            toast.innerText = "✅ मैसेज कार्ड के पीछे सफलतापूर्वक लॉक हो गया है! अब ऊपर कार्ड पर क्लिक करके देखें।";
            
            setTimeout(() => { toast.innerText = ""; }, 4000);
        }

        // 🔓 पासवर्ड डालकर मैसेज देखना
        function unlockMessage() {
            const enteredPass = document.getElementById('viewPassword').value.trim();

            if (!savedPassword) {
                alert("⚠️ पहले नीचे फॉर्म में मैसेज और पासवर्ड लिखकर 'लॉक करें' बटन दबाएं!");
                return;
            }

            if (enteredPass === savedPassword) {
                document.getElementById('secretText').innerText = savedMessage;
                document.getElementById('secureScreen').classList.add('hidden');
                document.getElementById('messageScreen').classList.remove('hidden');
            } else {
                alert("❌ गलत पासवर्ड! सही पासवर्ड डालें।");
            }
        }

        // वापस लॉक करने के लिए
        function lockCardAgain() {
            document.getElementById('viewPassword').value = "";
            document.getElementById('secureScreen').classList.remove('hidden');
            document.getElementById('messageScreen').classList.add('hidden');
        }
    </script>
</body>
</html>
