<!DOCTYPE html>
<html lang="hi">
<head>
    <script>
        // ⚡ आपकी लाइव बैकएंड API का सटीक लिंक
        const API_URL = 'https://onrender.com';
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D PIC STUDIO</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- ⚡ फिक्स्ड Tailwind CSS CDN (इसे सही तरीके से लोड करने के लिए बदला गया है) -->
    <script src="https://tailwindcss.com"></script>

    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0b0f19;
            color: #f8fafc;
            min-height: 100vh;
        }
        .main-card-panel {
            background-color: #161b26;
            border-radius: 20px;
        }
        .custom-input {
            background-color: #0d111a;
            border: 1px solid #222c3f;
            color: white;
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        .custom-input:focus {
            border-color: #6366f1;
            outline: none;
        }
        /* 3D Photo Display Box Preview */
        .photo-box-preview {
            background-color: #172030;
            border: 2px dashed #2a374e;
            border-radius: 20px;
            height: 380px;
            width: 100%;
            max-width: 340px;
        }
    </style>
</head>
<body class="p-4 flex flex-col items-center justify-start sm:py-8">

    <div class="w-full max-w-md flex flex-col items-center space-y-6">
        
        <!-- 🖼️ ऊपर का बड़ा फोटो डिस्प्ले एरिया -->
        <div class="photo-box-preview flex flex-col items-center justify-center p-6 text-center relative overflow-hidden shadow-2xl">
            <!-- अपलोडेड या जनरेटेड इमेज लेयर -->
            <img id="main-display-img" class="absolute inset-0 w-full h-full object-cover hidden z-0">
            
            <div id="placeholder-content" class="flex flex-col items-center justify-center space-y-3 z-10 text-slate-400">
                <!-- गैलरी आइकॉन -->
                <svg xmlns="http://w3.org" class="h-14 w-14 opacity-40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 002-2H4a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
                <p class="text-sm font-medium tracking-wide">फोटो यहाँ दिखेगी</p>
            </div>
        </div>

        <!-- 📑 नीचे का मुख्य कस्टमाइज़र फॉर्म बॉक्स -->
        <div class="main-card-panel w-full p-5 space-y-5 shadow-xl">
            
            <!-- 1. फोटो का तरीका सेलेक्टर्स -->
            <div class="space-y-2.5">
                <label class="block text-xs font-bold tracking-wide text-slate-400 uppercase">1. फोटो का तरीका</label>
                <div class="grid grid-cols-2 gap-2">
                    <!-- गैलरी अपलोड बटन -->
                    <button id="tab-upload" onclick="switchMethod('upload')" class="flex items-center justify-center gap-2 bg-gradient-to-r from-indigo-600 to-indigo-500 text-white font-bold p-3 rounded-xl text-xs shadow-md transition duration-200">
                        गैलरी अपलोड
                    </button>
                    <!-- AI जनरेशन बटन -->
                    <button id="tab-ai" onclick="switchMethod('ai')" class="flex items-center justify-center gap-2 bg-[#222a3a] text-slate-300 font-bold p-3 rounded-xl text-xs transition duration-200 hover:bg-[#2b354a]">
                        AI जनरेशन
                    </button>
                </div>

                <!-- गतिशील इनपुट फ़ील्ड्स -->
                <div id="method-container" class="pt-2">
                    <!-- डिफ़ॉल्ट: गैलरी फ़ाइल अपलोडर बटन -->
                    <input type="file" id="file-uploader" accept="image/*" onchange="loadLocalFile(event)" class="w-full text-xs text-slate-400 file:mr-3 file:py-2 file:px-3 file:rounded-lg file:border-0 file:text-xs file:font-semibold file:bg-[#222a3a] file:text-white hover:file:bg-[#2b354a] cursor-pointer">
                    
                    <!-- हिडन AI इनपुट बॉक्स -->
                    <div id="ai-input-box" class="hidden space-y-2">
                        <input type="text" id="ai-prompt-text" placeholder="इंग्लिश में लिखें क्या फोटो बनानी है..." class="w-full p-3 custom-input text-xs">
                        <button onclick="runMockAI()" class="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold p-2.5 rounded-xl text-[11px] transition">🎨 प्रॉम्प्ट प्रीव्यू सेट करें</button>
                    </div>
                </div>
            </div>

            <!-- 2. सीक्रेट संदेश -->
            <div class="space-y-1.5">
                <label class="block text-xs font-bold tracking-wide text-slate-400 uppercase">2. सीक्रेट संदेश</label>
                <textarea id="secret-message" rows="3" placeholder="चिठ्ठी यहाँ लिखें..." class="w-full p-3 custom-input text-xs resize-none"></textarea>
            </div>

            <!-- 3. पासवर्ड -->
            <div class="space-y-1.5">
                <label class="block text-xs font-bold tracking-wide text-slate-400 uppercase">3. पासवर्ड</label>
                <input type="password" id="card-password" placeholder="पासवर्ड चुनें" class="w-full p-3 custom-input text-xs">
            </div>

            <!-- 🎯 मुख्य सबमिट बटन -->
            <button onclick="publishStudioCard()" class="w-full bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 hover:opacity-95 text-white text-xs font-bold p-3.5 rounded-xl shadow-lg transition flex items-center justify-center gap-2 cursor-pointer">
                छोटा शेयर लिंक बनाएं
            </button>
            
            <!-- लाइव जनरेटेड लिंक आउटपुट कंटेनर -->
            <div id="output-box" class="hidden bg-emerald-500/10 border border-emerald-500/20 p-3.5 rounded-xl space-y-2">
                <p class="font-bold text-[11px] text-emerald-400">✨ आपका लिंक लाइव तैयार है:</p>
                <div class="flex gap-2">
                    <input type="text" id="final-link-url" readonly class="flex-1 bg-black/40 p-2 rounded-lg text-xs font-semibold text-slate-300 border border-slate-800 focus:outline-none">
                    <button onclick="copyGeneratedUrl()" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold px-3.5 rounded-lg text-xs transition cursor-pointer">Copy</button>
                </div>
            </div>

        </div>
    </div>

    <!-- JavaScript इंजन -->
    <script>
        let selectedMethod = 'upload';
        let finalImageBase64 = "";

        function switchMethod(method) {
            selectedMethod = method;
            const tabUpload = document.getElementById('tab-upload');
            const tabAi = document.getElementById('tab-ai');
            const fileInput = document.getElementById('file-uploader');
            const aiInputBox = document.getElementById('ai-input-box');

            if (method === 'upload') {
                tabUpload.className = "flex items-center justify-center gap-2 bg-gradient-to-r from-indigo-600 to-indigo-500 text-white font-bold p-3 rounded-xl text-xs shadow-md transition duration-200";
                tabAi.className = "flex items-center justify-center gap-2 bg-[#222a3a] text-slate-300 font-bold p-3 rounded-xl text-xs transition duration-200 hover:bg-[#2b354a]";
                fileInput.classList.remove('hidden');
                aiInputBox.classList.add('hidden');
            } else {
                tabAi.className = "flex items-center justify-center gap-2 bg-gradient-to-r from-indigo-600 to-indigo-500 text-white font-bold p-3 rounded-xl text-xs shadow-md transition duration-200";
                tabUpload.className = "flex items-center justify-center gap-2 bg-[#222a3a] text-slate-300 font-bold p-3 rounded-xl text-xs transition duration-200 hover:bg-[#2b354a]";
                fileInput.classList.add('hidden');
                aiInputBox.classList.remove('hidden');
            }
        }

        function loadLocalFile(event) {
            const file = event.target.files;
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    finalImageBase64 = e.target.result;
                    const displayImg = document.getElementById('main-display-img');
                    displayImg.src = finalImageBase64;
                    displayImg.classList.remove('hidden');
                    document.getElementById('placeholder-content').classList.add('hidden');
                }
                reader.readAsDataURL(file);
            }
        }

        function runMockAI() {
            const prompt = document.getElementById('ai-prompt-text').value;
            if(!prompt) return alert("कृपया प्रॉम्प्ट टाइप करें!");
            finalImageBase64 = "AI_PROMPT_MODE:" + prompt;
            alert("🎯 प्रॉम्प्ट सेव हो गया है! लिंक बनाने के लिए नीचे बढ़ें।");
        }

        async function publishStudioCard() {
            const message = document.getElementById('secret-message').value;
            const password = document.getElementById('card-password').value;

            if(!finalImageBase64) return alert("❌ पहले कदम 1 में कोई फ़ोटो या AI प्रॉम्प्ट चुनें!");
            if(!message || !password) return alert("❌ चिठ्ठी and पासवर्ड दोनों भरना आवश्यक है!");

            try {
                const res = await fetch(`${API_URL}/api/cards`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
