<!DOCTYPE html>
<html lang="hi">
<head>
    <script>
        // ⚡ आपका लाइव रेंडर लिंक यहाँ सेट है
        const API_URL = 'https://onrender.com';
    </script>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ 3D PIC STUDIO</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <script src="https://tailwindcss.com"></script>
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, #0a0f1d 0%, #1e1b4b 50%, #2e1065 100%);
            color: #f8fafc; min-height: 100vh; 
        }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; }
        .glass-input { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.1); color: white; border-radius: 12px; }
        .glass-input:focus { border-color: #818cf8; outline: none; }
        .card-3d-wrap { perspective: 1200px; width: 300px; height: 430px; }
        .card-3d-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); cursor: pointer; }
        .card-3d-inner.flipped { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 24px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 25px 50px rgba(0,0,0,0.5); border: 1px solid rgba(255, 255, 255, 0.1); }
        .card-back { transform: rotateY(180deg); padding: 24px; justify-content: space-between; background: #111827; }
        
        .art-bg-default { background: linear-gradient(135deg, #4f46e5, #06b6d4); }
        .art-bg-hate { background: linear-gradient(135deg, #111827, #dc2626, #000000); }
        .art-bg-love { background: linear-gradient(135deg, #ec4899, #f43f5e); }
        
        .theme-lemon { background: linear-gradient(135deg, #fef08a, #eab308); color: #0f172a; }
        .theme-peri { background: linear-gradient(135deg, #c7d2fe, #6366f1); color: white; }
        .theme-rose { background: linear-gradient(135deg, #fbcfe8, #db2777); color: white; }
        .theme-birthday { background: linear-gradient(135deg, #ffedd5, #f97316); color: white; }
        .theme-love { background: linear-gradient(135deg, #ffe4e6, #e11d48); color: white; }
        .theme-festival { background: linear-gradient(135deg, #fae8ff, #a855f7); color: white; }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col justify-between">

    <header class="max-w-6xl w-full mx-auto mb-8 glass p-4 flex justify-between items-center px-6">
        <h1 class="text-xl md:text-2xl font-extrabold tracking-tight bg-gradient-to-r from-indigo-400 to-pink-400 bg-clip-text text-transparent">✨ 3D PIC STUDIO</h1>
    </header>

    <main class="max-w-6xl w-full mx-auto flex-1 grid grid-cols-1 lg:grid-cols-12 gap-8 items-center">
        <div id="creator-view" class="lg:col-span-7 glass p-6 md:p-8 space-y-6">
            <div>
                <h2 class="text-xl font-bold text-white mb-1">आर्ट स्टूडियो मेकर</h2>
                <p class="text-xs text-slate-400">अपना नाम/भावना और कोई भी इमोजी डालें, सिस्टम खुद डिजिटल आर्ट बनाएगा।</p>
            </div>
            
            <div class="space-y-3">
                <label class="block font-semibold text-xs text-slate-400 uppercase tracking-wider">कदम 1: नाम/भावना लिखें और इमोजी चुनें</label>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <input type="text" id="ai-prompt" oninput="updatePreviewFront()" placeholder="उदा: I HATE YOU, RAHUL, HAPPY BIRTHDAY..." class="p-3 glass-input text-sm focus:outline-none">
                    <select id="emoji-select" onchange="updatePreviewFront()" class="p-3 glass-input text-sm focus:outline-none bg-slate-900 text-white">
                        <option value="😡">😡 गुस्सा (Angry)</option>
                        <option value="❤️">❤️ प्यार (Love)</option>
                        <option value="😇">😇 कार्टून स्माइल (Cute)</option>
                        <option value="🧸">🧸 टेडी बियर (Teddy)</option>
                        <option value="🎂">🎂 जन्मदिन (Birthday)</option>
                        <option value="🐱">🐱 बिल्ली कार्टून (Cat)</option>
                    </select>
                </div>
                <button onclick="generateCustomArt()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold p-2.5 rounded-xl text-xs transition">🎨 3D आर्ट जनरेट करें (Instant)</button>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div class="space-y-2">
                    <label class="block font-semibold text-xs text-slate-400 uppercase tracking-wider">कदम 2: पीछे का सीक्रेट मैसेज</label>
                    <input type="text" id="card-message" oninput="updatePreviewBack()" placeholder="यहाँ अपना गुप्त संदेश लिखें..." class="w-full p-3 glass-input text-sm">
                </div>
                <div class="space-y-2">
                    <label class="block font-semibold text-xs text-slate-400 uppercase tracking-wider">कदम 3: सुरक्षा लॉक पासवर्ड</label>
                    <input type="password" id="card-password" placeholder="पासवर्ड बनाएं..." class="w-full p-3 glass-input text-sm">
                </div>
            </div>

            <div class="space-y-2">
                <label class="block font-semibold text-xs text-slate-400 uppercase tracking-wider">कदम 4: बैकग्राउंड थीम चुनें</label>
                <div class="grid grid-cols-3 sm:grid-cols-6 gap-2">
                    <button onclick="setTheme('lemon')" class="p-2 rounded-xl font-bold text-xs bg-gradient-to-br from-yellow-300 to-yellow-500 text-slate-900 shadow">Gold</button>
                    <button onclick="setTheme('peri')" class="p-2 rounded-xl font-bold text-xs bg-gradient-to-br from-indigo-300 to-indigo-500 text-white shadow">Indigo</button>
                    <button onclick="setTheme('rose')" class="p-2 rounded-xl font-bold text-xs bg-gradient-to-br from-pink-300 to-pink-500 text-white shadow">Rose</button>
                    <button onclick="setTheme('birthday')" class="p-2 rounded-xl font-bold text-xs bg-gradient-to-br from-orange-300 to-orange-500 text-white shadow">Orange</button>
                    <button onclick="setTheme('love')" class="p-2 rounded-xl font-bold text-xs bg-gradient-to-br from-rose-400 to-red-600 text-white shadow">❤ Love</button>
                    <button onclick="setTheme('festival')" class="p-2 rounded-xl font-bold text-xs bg-gradient-to-br from-purple-400 to-purple-600 text-white shadow">Festival</button>
                </div>
            </div>

            <button onclick="publishCard()" class="w-full bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 hover:opacity-90 text-white text-base font-bold p-4 rounded-xl shadow-lg transition">🚀 लाइव लिंक जेनरेट करें</button>
            
            <div id="link-box" class="hidden bg-emerald-500/10 border border-emerald-500/30 p-4 rounded-xl space-y-2">
                <p class="font-bold text-xs text-emerald-400">✨ आपका कार्ड लाइव हो गया है! लिंक कॉपी करें:</p>
                <div class="flex gap-2">
                    <input type="text" id="share-url-output" readonly class="flex-1 bg-black/30 p-2 rounded-lg text-xs font-semibold text-slate-300 border border-slate-700">
                    <button onclick="copyLink()" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold px-4 rounded-lg text-xs transition">Copy</button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-5 flex flex-col items-center justify-center py-6">
            <span class="text-[11px] font-bold tracking-widest text-indigo-400 uppercase mb-4 bg-indigo-500/10 px-3 py-1 rounded-full border border-indigo-500/20">3D लाइव प्रीव्यू (क्लिक करें)</span>
            <div class="card-3d-wrap" onclick="document.getElementById('preview-inner').classList.toggle('flipped')">
                <div class="card-3d-inner" id="preview-inner">
                    
                    <div class="card-front art-bg-default flex items-center justify-center text-center p-6" id="card-front-render">
                        <div class="space-y-4">
                            <div id="preview-emoji" class="text-6xl">❤️</div>
                            <h3 id="preview-text" class="text-xl font-black uppercase tracking-wide">YOUR NAME</h3>
                        </div>
                    </div>
                    
                    <div class="card-back flex flex-col justify-between p-6">
                        <div class="text-xs font-bold text-indigo-400">🔒 सीक्रेट संदेश</div>
                        <p id="preview-back-message" class="text-center italic text-sm text-slate-300">
                            यहाँ आपका गुप्त संदेश दिखेगा...
                        </p>
                        <div class="text-[10px] text-slate-500 text-center">सुरक्षित पासवर्ड प्रोटेक्टेड कार्ड</div>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <script>
        let currentTheme = 'peri';

        function updatePreviewFront() {
            const prompt = document.getElementById('ai-prompt').value;
            const emoji = document.getElementById('emoji-select').value;
            document.getElementById('preview-text').innerText = prompt ? prompt : "YOUR NAME";
            document.getElementById('preview-emoji').innerText = emoji;
        }

        function updatePreviewBack() {
            const message = document.getElementById('card-message').value;
            document.getElementById('preview-back-message').innerText = message ? message : "यहाँ आपका गुप्त संदेश दिखेगा...";
        }

        function setTheme(themeName) {
