<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secret Share</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family: 'Segoe UI', sans-serif;}
  body{
    background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
    color: #fff;
    min-height: 100vh;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
.time-bar{
    width: 100%;
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    margin-bottom: 30px;
    opacity: 0.8;
  }
.photo-box{
    width: 100%;
    max-width: 350px;
    height: 300px;
    background: #1e293b;
    border-radius: 20px;
    border: 2px dashed #334155;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    margin-bottom: 25px;
    overflow: hidden;
    position: relative;
  }
.photo-box img{width: 100%; height: 100%; object-fit: cover; display: none;}
.photo-box svg{width: 50px; height: 50px; fill: #64748b; margin-bottom: 10px;}
.photo-box p{color: #94a3b8; font-size: 16px; text-align: center;}
.loader{
    display: none;
    width: 40px;
    height: 40px;
    border: 4px solid #334155;
    border-top: 4px solid #8b5cf6;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
 @keyframes spin{0%{transform: rotate(0deg);} 100%{transform: rotate(360deg);}}

.card{
    background: #1e293b;
    border-radius: 20px;
    padding: 20px;
    width: 100%;
    max-width: 350px;
  }
.section{margin-bottom: 20px;}
.section label{
    display: block;
    font-size: 14px;
    margin-bottom: 8px;
    color: #cbd5e1;
  }
.btn-group{display: flex; gap: 10px; margin-bottom: 12px;}
.btn{
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
.btn-active{background: #6366f1; color: white;}
.btn-inactive{background: #334155; color: #94a3b8;}

  input[type="file"]{
    width: 100%;
    padding: 10px;
    background: #0f172a;
    border: 1px dashed #475569;
    border-radius: 10px;
    color: #94a3b8;
    cursor: pointer;
  }
  textarea, input[type="password"], input[type="text"]{
    width: 100%;
    padding: 12px;
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 10px;
    color: #fff;
    font-size: 14px;
    outline: none;
  }
  textarea{resize: vertical; min-height: 60px;}
  textarea::placeholder, input::placeholder{color: #64748b;}

.share-btn{
    width: 100%;
    padding: 15px;
    background: #8b5cf6;
    border: none;
    border-radius: 15px;
    color: white;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 10px;
  }
.share-btn:hover{opacity: 0.9;}
.generate-btn{
    width: 100%;
    padding: 12px;
    background: #6366f1;
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 14px;
    cursor: pointer;
    margin-top: 8px;
  }
</style>
</head>
<body>

<div class="time-bar">
  <span id="time">12:19</span>
  <span>Vo LTE 4G 📶 🔋72%</span>
</div>

<div class="photo-box" id="previewBox">
  <svg id="placeholderIcon" viewBox="0 0 24 24"><path d="M19 5v14H5V5h14m1-2H4c-1.1 0-2.9-2 2v14c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-4.86 9.86-3 3.87L9 13.14 6 17h12l-4.86-4.14z"/></svg>
  <p id="placeholderText">फोटो यहाँ दिखेगी</p>
  <div class="loader" id="loader"></div>
  <img id="previewImg" alt="preview">
</div>

<div class="card">
  <div class="section">
    <label>1. फोटो का तरीका</label>
    <div class="btn-group">
      <button class="btn btn-active" id="uploadBtn" onclick="selectMode('upload')">📁 गैलरी अपलोड</button>
      <button class="btn btn-inactive" id="aiBtn" onclick="selectMode('ai')">✨ AI जनरेशन</button>
    </div>

    <div id="uploadSection">
      <input type="file" id="fileInput" accept="image/*">
    </div>

    <div id="aiSection" style="display:none;">
      <input type="text" id="aiPrompt" placeholder="AI को बताओ कैसी image चाहिए... ex: sunset over mountains">
      <button class="generate-btn" onclick="generateAI()">🎨 Image Generate करो</button>
      <p style="font-size: 12px; color: #64748b; margin-top: 5px;">Note: Abhi demo hai. Real AI ke liye API key add karni padegi</p>
    </div>
  </div>

  <div class="section">
    <label>2. सीक्रेट संदेश</label>
    <textarea placeholder="चिट्ठी यहाँ लिखें..."></textarea>
  </div>

  <div class="section">
    <label>3. पासवर्ड</label>
    <input type="password" placeholder="पासवर्ड चुनें">
  </div>

  <button class="share-btn" onclick="generateLink()">🔗 छोटा शेयर लिंक बनाएं</button>
</div>

<script>
  let currentMode = 'upload';

  // Time update
  function updateTime(){
    document.getElementById('time').innerText = new Date().toLocaleTimeString('hi-IN',{hour:'2-digit',minute:'2-digit'});
  }
  updateTime(); setInterval(updateTime, 60000);

  // Mode select
  function selectMode(mode){
    currentMode = mode;
    document.getElementById('uploadBtn').className = mode=='upload'? 'btn btn-active' : 'btn btn-inactive';
    document.getElementById('aiBtn').className = mode=='ai'? 'btn btn-active' : 'btn btn-inactive';
    document.getElementById('uploadSection').style.display = mode=='upload'? 'block' : 'none';
    document.getElementById('aiSection').style.display = mode=='ai'? 'block' : 'none';
  }

  // File preview
  document.getElementById('fileInput').addEventListener('change', function(e){
    const file = e.target.files[0];
    if(file){
      showImage(URL.createObjectURL(file));
    }
  });

  // AI Generate - Demo + API ready
  async function generateAI(){
    const prompt = document.getElementById('aiPrompt').value.trim();
    if(!prompt){
      alert('पहले prompt लिखो भाई 😅');
      return;
    }

    showLoader(true);

    // DEMO: 2 sec baad random image
    // Real API ke liye niche wala commented code use karo
    setTimeout(() => {
      const randomImg = `https://picsum.photos/400/300?random=${Date.now()}`;
      showImage(randomImg);
      showLoader(false);
    }, 2000);

    /* REAL AI API CODE - HuggingFace Stable Diffusion example
    const response = await fetch("https://api-inference.huggingface.co/models/stabilityai/stable-diffusion-2-1", {
      method: "POST",
      headers: {
        "Authorization": "Bearer YOUR_API_KEY_HERE",
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ inputs: prompt })
    });
    const blob = await response.blob();
    const imgUrl = URL.createObjectURL(blob);
    showImage(imgUrl);
    showLoader(false);
    */
  }

  function showImage(src){
    document.getElementById('previewImg').src = src;
    document.getElementById('previewImg').style.display = 'block';
    document.getElementById('placeholderIcon').style.display = 'none';
    document.getElementById('placeholderText').style.display = 'none';
  }

  function showLoader(show){
    document.getElementById('loader').style.display = show? 'block' : 'none';
    document.getElementById('placeholderIcon').style.display = show? 'none' : 'block';
    document.getElementById('placeholderText').style.display = show? 'none' : 'block';
    document.getElementById('previewImg').style.display = 'none';
  }

  // Link generate dummy
  function generateLink(){
    alert('लिंक बन गया! Backend जोड़ने पर यहाँ short link generate होगा।');
  }
</script>

</body>
</html>
